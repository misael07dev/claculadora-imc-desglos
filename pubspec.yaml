name: imc_calculador
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  flutter_svg: ^2.0.10
  google_sign_in: ^6.2.1
  google_mobile_ads: ^5.0.0
  flutter_screenutil: ^5.9.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/image/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/logoapp.png"

  adaptive_icon_background: "#004288"
  adaptive_icon_foreground: "assets/image/logoapp.png"

  adaptive_icon_foreground_inset: 0   

  remove_alpha_ios: true